apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookshop-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bookshop
  template:
    metadata:
      labels:
        app: bookshop
    spec:
      containers:
      - name: bookshop
        image: avesahmed/bookshop:v3
        ports:
        - containerPort: 8080
